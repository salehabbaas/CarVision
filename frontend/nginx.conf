# Log only standard HTTP methods. This avoids noisy binary/TLS handshake
# garbage in access logs when clients accidentally hit HTTP port with HTTPS.
map $request_method $loggable {
  default 0;
  GET 1;
  POST 1;
  PUT 1;
  PATCH 1;
  DELETE 1;
  OPTIONS 1;
  HEAD 1;
}

log_format carvision '$remote_addr - $remote_user [$time_local] "$request" '
                     '$status $body_bytes_sent "$http_referer" "$http_user_agent"';

server {
  listen 80;
  listen 443 ssl;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;
  ssl_certificate     /etc/nginx/certs/server.crt;
  ssl_certificate_key /etc/nginx/certs/server.key;
  access_log /var/log/nginx/access.log carvision if=$loggable;

  # ── Security headers ──────────────────────────────────────────────────────
  add_header X-Frame-Options        SAMEORIGIN always;
  add_header X-Content-Type-Options nosniff    always;
  add_header Referrer-Policy        no-referrer-when-downgrade always;

  # ── Backend API ───────────────────────────────────────────────────────────
  location /api/ {
    proxy_pass         http://carvision-backend:8000;
    proxy_http_version 1.1;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    # Allow larger dataset ZIP uploads for training import endpoints.
    client_max_body_size 5g;
    proxy_connect_timeout 10s;
    proxy_send_timeout    600s;
    proxy_read_timeout    600s;
  }

  # ── Live MJPEG / snapshot stream ─────────────────────────────────────────
  # Buffering must be OFF so frames are pushed to the browser immediately.
  location /stream/ {
    proxy_pass         http://carvision-backend:8000;
    proxy_http_version 1.1;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;

    # Critical for low-latency streaming – disable ALL buffering layers
    proxy_buffering        off;
    proxy_cache            off;
    proxy_request_buffering off;
    add_header             X-Accel-Buffering no always;

    # Long timeout so the browser can hold the stream open indefinitely
    proxy_read_timeout    3600s;
    proxy_send_timeout    3600s;
    proxy_connect_timeout 10s;

    # Allow gzip to be disabled (streaming content must not be gzip-compressed)
    gzip off;
  }

  # ── Browser-camera frame ingest (POST from phone/tablet) ─────────────────
  # Large body limit so hi-res JPEG frames are accepted.
  location /api/v1/capture/ {
    proxy_pass         http://carvision-backend:8000;
    proxy_http_version 1.1;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    client_max_body_size  10m;
    proxy_connect_timeout 10s;
    proxy_send_timeout    30s;
    proxy_read_timeout    30s;
  }

  # ── Legacy capture compatibility endpoints ────────────────────────────────
  # Keep these proxied so older capture flows (or fallback paths) continue to
  # work while the React route /capture/:id still serves from the SPA.
  location /ingest/ {
    proxy_pass         http://carvision-backend:8000;
    proxy_http_version 1.1;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    client_max_body_size  10m;
    proxy_connect_timeout 10s;
    proxy_send_timeout    30s;
    proxy_read_timeout    30s;
  }

  location ~ ^/capture/[0-9]+/(overlay|session)$ {
    proxy_pass         http://carvision-backend:8000;
    proxy_http_version 1.1;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_connect_timeout 10s;
    proxy_send_timeout    30s;
    proxy_read_timeout    30s;
  }

  # ── Static media (snapshots, debug images, clips) ────────────────────────
  location /media/ {
    proxy_pass         http://carvision-backend:8000;
    proxy_http_version 1.1;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_connect_timeout 10s;
    proxy_read_timeout    60s;
  }

  # ── React SPA – catch-all ─────────────────────────────────────────────────
  location = /index.html {
    add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
    add_header Pragma "no-cache" always;
    add_header Expires "0" always;
    try_files $uri =404;
  }

  location / {
    add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
    try_files $uri $uri/ /index.html;
    # Cache immutable hashed JS/CSS bundles aggressively
    location ~* \.(js|css|woff2?|ttf|eot|svg|png|jpg|ico|webp)$ {
      expires 1y;
      add_header Cache-Control "public, immutable";
      try_files $uri =404;
    }
  }
}
