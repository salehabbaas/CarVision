[alembic]
# Path to migration scripts directory (relative to this file)
script_location = migrations

# Database URL — overridden at runtime by env.py reading DATABASE_URL from environment.
# Do NOT put real credentials here; use the DATABASE_URL environment variable.
sqlalchemy.url = sqlite:///./carvision.db

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
