apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: carvision-api-hpa
  namespace: carvision
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: carvision-api
  minReplicas: 2
  maxReplicas: 12
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 65
